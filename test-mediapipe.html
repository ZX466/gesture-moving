<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPipe 测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
        }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
        }
        .success { border-left: 4px solid #10b981; }
        .error { border-left: 4px solid #ef4444; }
        .warning { border-left: 4px solid #fbbf24; }
        video {
            width: 640px;
            height: 480px;
            background: #000;
            margin: 20px 0;
            display: block;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #4338ca;
        }
        #log {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <h1>🧪 MediaPipe Hands 测试工具</h1>
    
    <div class="status" id="init-status">
        <strong>初始化状态:</strong> <span id="init-text">等待测试...</span>
    </div>
    
    <div>
        <button onclick="testMediaPipe()">1️⃣ 测试 MediaPipe 加载</button>
        <button onclick="startCamera()">2️⃣ 启动摄像头</button>
        <button onclick="stopCamera()">⏹️ 停止摄像头</button>
        <button onclick="clearLog()">🗑️ 清除日志</button>
    </div>
    
    <video id="test-video" playsinline autoplay muted></video>
    
    <div id="log"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    
    <script>
        let hands = null;
        let camera = null;
        let isRunning = false;
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const timestamp = new Date().toLocaleTimeString();
            
            const colors = {
                info: '#60a5fa',
                success: '#10b981',
                error: '#ef4444',
                warning: '#fbbf24'
            };
            
            entry.innerHTML = `<span style="color: ${colors[type] || colors.info}">[${timestamp}] ${message}</span>`;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }
        
        function updateStatus(text, type = 'info') {
            const statusDiv = document.getElementById('init-status');
            const textSpan = document.getElementById('init-text');
            textSpan.textContent = text;
            
            statusDiv.className = 'status ' + type;
        }
        
        async function testMediaPipe() {
            log('开始测试 MediaPipe...', 'info');
            updateStatus('测试中...', 'warning');
            
            // 检查库是否加载
            if (typeof Hands === 'undefined') {
                log('❌ MediaPipe Hands 库未加载！', 'error');
                updateStatus('MediaPipe Hands 库未加载', 'error');
                return;
            }
            
            log('✅ MediaPipe Hands 库已加载', 'success');
            
            try {
                hands = new Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });
                
                hands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.5
                });
                
                hands.onResults((results) => {
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        log(`✅ 检测到手势！数量：${results.multiHandLandmarks.length}`, 'success');
                        console.log('Landmarks:', results.multiHandLandmarks[0]);
                    } else {
                        log('📊 未检测到手势', 'info');
                    }
                });
                
                log('✅ MediaPipe Hands 初始化成功', 'success');
                updateStatus('MediaPipe Hands 已就绪', 'success');
                
            } catch (error) {
                log(`❌ MediaPipe Hands 初始化失败：${error.message}`, 'error');
                updateStatus('初始化失败：' + error.message, 'error');
            }
        }
        
        async function startCamera() {
            if (!hands) {
                log('❌ 请先测试 MediaPipe！', 'error');
                return;
            }
            
            if (isRunning) {
                log('⚠️ 摄像头已在运行中', 'warning');
                return;
            }
            
            const videoElement = document.getElementById('test-video');
            log('📷 请求摄像头权限...', 'info');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'user'
                    }
                });
                
                log('✅ 摄像头权限已授予', 'success');
                videoElement.srcObject = stream;
                
                videoElement.onloadedmetadata = () => {
                    log(`🎬 视频已加载：${videoElement.videoWidth}x${videoElement.videoHeight}`, 'success');
                    videoElement.play();
                    isRunning = true;
                    processFrames();
                };
                
            } catch (error) {
                log(`❌ 摄像头访问失败：${error.message}`, 'error');
            }
        }
        
        async function processFrames() {
            if (!isRunning || !hands) return;
            
            const videoElement = document.getElementById('test-video');
            
            try {
                if (videoElement && videoElement.readyState >= 2) {
                    await hands.send({ image: videoElement });
                }
            } catch (error) {
                log(`帧处理错误：${error.message}`, 'error');
            }
            
            if (isRunning) {
                requestAnimationFrame(processFrames);
            }
        }
        
        function stopCamera() {
            const videoElement = document.getElementById('test-video');
            
            if (videoElement.srcObject) {
                const tracks = videoElement.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                videoElement.srcObject = null;
                log('🛑 摄像头已停止', 'info');
            }
            
            isRunning = false;
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('日志已清除', 'info');
        }
        
        // 自动测试
        window.addEventListener('load', () => {
            log('页面加载完成', 'info');
            log('点击 "1️⃣ 测试 MediaPipe 加载" 开始测试', 'info');
        });
    </script>
</body>
</html>
